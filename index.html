<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FD Calculator</title>

<style>
    body {
        font-family: Arial, sans-serif;
        display: flex;
      justify-content: center;
        margin-top: 50px;
        color: green;
        background-color: aqua;
        animation-duration: 20s;
    }

    .calculator {
        width: 400px;
        padding: 20px;
        border: 1px solid #2a412e;
        border-radius: 20px;
                background-color: rgb(130, 227, 227);
                box: shadow 2px;;

        color: #2a412e;
    }

    h1 {
        text-align: center;
        color: rgb(3, 14, 14);
    }

    .input-section {
        margin: 20px 0;
        color: rgb(3, 24, 24);
    }

    label {
        display: block;
        margin-bottom: 8px;
        color: rgb(18, 11, 3);
    }

    input[type="range"] {
        width: 100%;
        color: rgb(20, 20, 20);
    }

    span {
        font-weight: bold;
        color: rgb(19, 20, 19) ;
        animation-direction: alternate;
    }

    button {
        width: 100%;
        padding: 10px;
        cursor: pointer;
        margin-top: 10px;
        background-color: rgb(34, 182, 34);
        color: rgb(17, 18, 17);
    }

    .output-section {
        margin-top: 20px;
        color: rgb(13, 9, 4);
    }

    .output-section p {
        display: flex;
        color: rgb(22, 16, 8);
        justify-content: space-between;
    }
</style>
</head>

<body>

<div class="calculator">
    <h1>FD CALCULATOR</h1>

    <div class="input-section">
        <label for="investment">Investment Amount</label>
        <input type="range" id="investment" min="1000" max="1000000" step="1000" value="1000000">
        <span id="investment-value">10,00,000</span>
    </div>

    <div class="input-section">
        <label for="interest">Interest Rate (%)</label>
        <input type="range" id="interest" min="1" max="18" step="0.1" value="6.5">
        <span id="interest-value">6.5%</span>
    </div>

    <div class="input-section">
        <label for="time">Time (Years)</label>
        <input type="range" id="time" min="1" max="65" step="1" value="6">
        <span id="time-value">6</span>
    </div>

    <button onclick="calculator()">Invest Now</button>

    <div class="output-section">
        <p>Invested Amount: <span id="invested-amount">----</span></p>
        <p>Estimated Returns: <span id="estimated-returns">----</span></p>
        <p>Total Amount: <span id="total-value">----</span></p>
    </div>
</div>


</body>
<script src="a8.js"></script>
</html>
